version: '3.9'

services:
  # ── PostgreSQL Database ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lds_ysa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       lds_ysa_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: Kingzeedoch29
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lds_admin -d lds_ysa_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (caching, presence, sessions) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: lds_ysa_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API + WebSocket Server ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lds_ysa_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST:     postgres
      REDIS_HOST:  redis
      NODE_ENV:    production
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy + SSL ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lds_ysa_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend

  # ── Certbot (automatic SSL renewal) ───────────────────────────
  certbot:
    image: certbot/certbot
    container_name: lds_ysa_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot
             --email admin@yourdomain.com --agree-tos --no-eff-email
             -d api.yourdomain.com
    profiles:
      - ssl-setup  # Run manually: docker compose --profile ssl-setup up certbot

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_webroot:

networks:
  default:
    name: lds_ysa_network
