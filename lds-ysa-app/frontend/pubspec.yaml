name: chatsaints
description: "ChatSaints: Church Chat & Community App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  web_socket_channel: ^3.0.3
  provider: ^6.1.2
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  # Pinned to 10.x: 11.0.2's Gradle script assumes AGP 9 implies built-in
  # Kotlin, which the Flutter template disables, so its Kotlin never compiles.
  # Bump to 11+ once flutter_file_picker handles android.builtInKotlin=false.
  file_picker: ^10.3.10
  url_launcher: ^6.2.5
  flutter_webrtc: ^1.4.1
  just_audio: ^0.10.5
  video_player: ^2.8.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.0
  intl: ^0.20.2
  timeago: ^3.6.1
  uuid: ^4.3.3
  record: ^7.0.0
  cross_file: ^0.3.4
  permission_handler: ^12.0.3
  connectivity_plus: ^7.1.1
  path_provider: ^2.1.2
  # E2EE: Signal Protocol
  cryptography: ^2.7.0
  pointycastle: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Icon & splash generation
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.3.13


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

# App icon configuration
flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1A5276"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#1A5276"
    theme_color: "#1A5276"

# Splash screen configuration
flutter_native_splash:
  color: "#1A5276"
  image: assets/images/splash.png
  android_12:
    image: assets/images/splash.png
    icon_background_color: "#1A5276"
  ios: true
  android: true
