worker_processes auto;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Performance
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  # Security headers
  add_header X-Frame-Options         SAMEORIGIN;
  add_header X-XSS-Protection        "1; mode=block";
  add_header X-Content-Type-Options  nosniff;
  add_header Referrer-Policy         no-referrer-when-downgrade;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m      rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
  limit_req_zone $binary_remote_addr zone=ws:10m       rate=20r/m;
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  # Redirect HTTP -> HTTPS
  server {
    listen 80;
    server_name api.yourdomain.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # Main HTTPS server
  server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/nginx/ssl/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 110M;   # Allow up to 110MB uploads (slightly above app's 100MB limit)

    # WebSocket endpoint (real-time messaging)
    location /ws {
      proxy_pass          http://backend:4000;
      proxy_http_version  1.1;
      proxy_set_header    Upgrade $http_upgrade;
      proxy_set_header    Connection "upgrade";
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout  3600s;   # Keep WS connections alive for 1 hour
      proxy_send_timeout  3600s;
      limit_req           zone=ws burst=30 nodelay;
      limit_conn          conn 10;
    }

    # Auth endpoints (strict rate limit)
    location ~ ^/api/auth/(login|register) {
      proxy_pass         http://backend:4000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      limit_req          zone=auth burst=5 nodelay;
    }

    # Media uploads
    location /uploads/ {
      proxy_pass         http://backend:4000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      expires            7d;
      add_header         Cache-Control "public, immutable";
    }

    # All other API endpoints
    location /api/ {
      proxy_pass         http://backend:4000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
      limit_req          zone=api burst=50 nodelay;
      limit_conn         conn 20;
    }

    # Health check (no rate limit)
    location /health {
      proxy_pass http://backend:4000;
      access_log off;
    }
  }
}
